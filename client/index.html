<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#030a03" />
  <title>QuakeComm</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>

  <div id="radar-bg">
    <canvas id="radar-canvas"></canvas>
  </div>

  <div id="scanline"></div>

  <div id="app">

    <div id="header">
      <div id="logo-line">
        <div id="signal-dot"></div>
        <h1>QUAKECOMM</h1>
      </div>
      <p id="status-bar" class="mono">SYS: CHECKING CONNECTION...</p>
    </div>

    <div id="divider"></div>

    <div id="main">

      <p id="instruction" class="mono">// SELECT STATUS</p>

      <div id="buttons">
        <button class="status-btn" id="btn-critical" data-status="critical">
          <span class="btn-dot critical-dot"></span>
          <span class="btn-label" data-i18n="injured">INJURED</span>
          <span class="btn-code mono">PRIORITY 1</span>
        </button>
        <button class="status-btn" id="btn-trapped" data-status="trapped">
          <span class="btn-dot trapped-dot"></span>
          <span class="btn-label" data-i18n="trapped">TRAPPED</span>
          <span class="btn-code mono">PRIORITY 2</span>
        </button>
        <button class="status-btn" id="btn-safe" data-status="safe">
          <span class="btn-dot safe-dot"></span>
          <span class="btn-label" data-i18n="safe">SAFE</span>
          <span class="btn-code mono">PRIORITY 3</span>
        </button>
      </div>

      <div id="note-wrapper">
        <label class="mono" id="note-label" data-i18n="additional_info">// ADDITIONAL INFO</label>
        <textarea id="note" placeholder="Describe your situation..." maxlength="100"></textarea>
        <span id="char-count" class="mono">0/100</span>
      </div>

      <button id="send-btn">
        <span id="send-label" data-i18n="transmit">TRANSMIT SIGNAL</span>
        <span id="send-icon">⟶</span>
      </button>

      <p id="feedback" class="mono"></p>

    </div>

    <div id="footer" class="mono">
      <div id="lang-bar">
        <button class="lang-btn active" onclick="setLang('en', this)">EN</button>
        <button class="lang-btn" onclick="setLang('tr', this)">TR</button>
        <button class="lang-btn" onclick="setLang('de', this)">DE</button>
        <button class="lang-btn" onclick="setLang('el', this)">EL</button>
        <button class="lang-btn" onclick="setLang('it', this)">IT</button>
      </div>
      GPS: <span id="gps-status">ACQUIRING...</span>
      &nbsp;|&nbsp;
      MODE: <span id="mode-status">ONLINE</span>
      &nbsp;|&nbsp;
      SIG: <span id="sig-strength">██░░░</span>
    </div>

  </div>

  <script>
    const TRANSLATIONS = {
      en: { injured: 'INJURED', trapped: 'TRAPPED', safe: 'SAFE', additional_info: '// ADDITIONAL INFO', transmit: 'TRANSMIT SIGNAL', placeholder: 'Describe your situation...' },
      tr: { injured: 'YARALIYIM', trapped: 'MAHSURUM', safe: 'SAGLAMIM', additional_info: '// EK BILGI', transmit: 'SINYAL GONDER', placeholder: 'Durumunuzu aciklayin...' },
      de: { injured: 'VERLETZT', trapped: 'EINGESCHLOSSEN', safe: 'SICHER', additional_info: '// ZUSATZINFO', transmit: 'SIGNAL SENDEN', placeholder: 'Beschreiben Sie Ihre Situation...' },
      el: { injured: 'TRAUMATIAS', trapped: 'PAGIDEUOMENOS', safe: 'ASFALOS', additional_info: '// PLIROFOIRIES', transmit: 'APOSTOLI SIMATOS', placeholder: 'Perigraste tin katastasi sas...' },
      it: { injured: 'FERITO', trapped: 'INTRAPPOLATO', safe: 'SICURO', additional_info: '// INFO AGGIUNTIVE', transmit: 'TRASMETTI SEGNALE', placeholder: 'Descrivi la tua situazione...' }
    };

    function setLang(lang, btn) {
      const t = TRANSLATIONS[lang];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key]) el.textContent = t[key];
      });
      document.getElementById('note').placeholder = t.placeholder;
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    const canvas = document.getElementById('radar-canvas');
    const ctx = canvas.getContext('2d');
    let angle = 0;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    resize();
    window.addEventListener('resize', resize);

    const dots = Array.from({length: 6}, () => ({
      r: Math.random() * 180 + 40,
      a: Math.random() * Math.PI * 2,
      brightness: 0
    }));

    function draw() {
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;
      const maxR = Math.min(canvas.width, canvas.height) * 0.42;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      [0.3, 0.55, 0.8, 1].forEach(scale => {
        ctx.beginPath();
        ctx.arc(cx, cy, maxR * scale, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(0, 200, 80, 0.07)';
        ctx.lineWidth = 1;
        ctx.stroke();
      });

      ctx.strokeStyle = 'rgba(0, 200, 80, 0.06)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(cx - maxR, cy); ctx.lineTo(cx + maxR, cy); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx, cy - maxR); ctx.lineTo(cx, cy + maxR); ctx.stroke();

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(angle);

      const sweep = ctx.createLinearGradient(0, 0, maxR, 0);
      sweep.addColorStop(0, 'rgba(0, 220, 80, 0.0)');
      sweep.addColorStop(0.7, 'rgba(0, 220, 80, 0.06)');
      sweep.addColorStop(1, 'rgba(0, 220, 80, 0.18)');

      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.arc(0, 0, maxR, -0.35, 0);
      ctx.closePath();
      ctx.fillStyle = sweep;
      ctx.fill();

      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(maxR, 0);
      ctx.strokeStyle = 'rgba(0, 255, 80, 0.35)';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      ctx.restore();

      dots.forEach(dot => {
        const da = ((angle - dot.a) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
        if (da < 0.15) dot.brightness = 1;
        else dot.brightness *= 0.985;

        if (dot.brightness > 0.05) {
          const dx = cx + Math.cos(dot.a) * dot.r * (maxR / 200);
          const dy = cy + Math.sin(dot.a) * dot.r * (maxR / 200);
          ctx.beginPath();
          ctx.arc(dx, dy, 3, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(0, 255, 100, ${dot.brightness * 0.9})`;
          ctx.fill();

          if (dot.brightness > 0.3) {
            ctx.beginPath();
            ctx.arc(dx, dy, 8, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(0, 255, 100, ${dot.brightness * 0.08})`;
            ctx.fill();
          }
        }
      });

      ctx.beginPath();
      ctx.arc(cx, cy, 3, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0, 255, 80, 0.6)';
      ctx.fill();

      angle += 0.012;
      requestAnimationFrame(draw);
    }

    draw();
  </script>

  <script src="app.js"></script>

</body>
</html>
